<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>SaaS ダッシュボード</title>
  </head>
  <body>
    <header>
      <h1>運用ダッシュボード</h1>
      <nav aria-label="期間フィルタ">
        <button type="button" data-range="7d" aria-pressed="true">7 日</button>
        <button type="button" data-range="30d" aria-pressed="false">30 日</button>
        <button type="button" data-range="90d" aria-pressed="false">90 日</button>
      </nav>
    </header>
    <main>
      <section aria-labelledby="kpi-heading">
        <h2 id="kpi-heading">KPI</h2>
        <dl>
          <dt>アクティブユーザー</dt>
          <dd id="kpi-users" aria-live="polite">0</dd>
          <dt>売上 (JPY)</dt>
          <dd id="kpi-revenue" aria-live="polite">0</dd>
          <dt>解約率</dt>
          <dd id="kpi-churn" aria-live="polite">0%</dd>
        </dl>
      </section>
      <section aria-labelledby="alerts-heading">
        <h2 id="alerts-heading">最近のアラート</h2>
        <ul id="alert-list" aria-label="アラート一覧"></ul>
      </section>
      <section aria-labelledby="detail-heading" hidden>
        <h2 id="detail-heading">アラート詳細</h2>
        <p id="detail-body"></p>
        <button type="button" id="detail-close">閉じる</button>
      </section>
    </main>
    <script>
      const ranges = {
        '7d': { users: 1230, revenue: 482000, churn: 2.1 },
        '30d': { users: 4840, revenue: 1985000, churn: 3.4 },
        '90d': { users: 13420, revenue: 5870000, churn: 4.2 },
      };
      const alerts = [
        { id: 'a1', title: 'API レイテンシ高騰', body: '直近 5 分で p95 が 800ms を超えています。' },
        { id: 'a2', title: 'ストレージ容量 80%', body: 'バケット usage が 80% を超えました。' },
        { id: 'a3', title: '解約率上昇', body: '今週の解約率が前週比 +1.2pt です。' },
      ];
      let currentRange = '7d';

      const users = document.getElementById('kpi-users');
      const revenue = document.getElementById('kpi-revenue');
      const churn = document.getElementById('kpi-churn');
      const alertList = document.getElementById('alert-list');
      const detail = document.querySelector('section[aria-labelledby="detail-heading"]');
      const detailBody = document.getElementById('detail-body');
      const detailClose = document.getElementById('detail-close');
      const rangeBtns = document.querySelectorAll('[data-range]');

      function renderKpi() {
        const r = ranges[currentRange];
        users.textContent = String(r.users);
        revenue.textContent = String(r.revenue);
        churn.textContent = `${r.churn}%`;
        for (const btn of rangeBtns) {
          btn.setAttribute('aria-pressed', btn.dataset.range === currentRange ? 'true' : 'false');
        }
      }

      function renderAlerts() {
        alertList.innerHTML = '';
        for (const alert of alerts) {
          const li = document.createElement('li');
          const button = document.createElement('button');
          button.type = 'button';
          button.textContent = alert.title;
          button.dataset.alertId = alert.id;
          button.addEventListener('click', () => {
            detailBody.textContent = alert.body;
            detail.hidden = false;
          });
          li.append(button);
          alertList.append(li);
        }
      }

      detailClose.addEventListener('click', () => {
        detail.hidden = true;
        detailBody.textContent = '';
      });

      for (const btn of rangeBtns) {
        btn.addEventListener('click', () => {
          currentRange = btn.dataset.range;
          renderKpi();
        });
      }

      renderKpi();
      renderAlerts();
    </script>
  </body>
</html>
