<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>ダッシュボード</title>
  </head>
  <body>
    <header>
      <h1>ダッシュボード</h1>
      <p>
        ユーザー: <span id="user-email" aria-live="polite"></span>
      </p>
    </header>
    <main>
      <nav aria-label="主要メニュー">
        <ul>
          <li><a href="./shop.html" data-testid="nav-shop">商品検索</a></li>
          <li><a href="#orders" data-testid="nav-orders">注文履歴</a></li>
          <li><a href="#settings" data-testid="nav-settings">設定</a></li>
        </ul>
      </nav>
      <section aria-labelledby="kpi-heading">
        <h2 id="kpi-heading">サマリー</h2>
        <ul>
          <li>今月の注文: <span data-testid="kpi-orders">12</span> 件</li>
          <li>カート残: <span data-testid="kpi-cart">3</span> 点</li>
        </ul>
      </section>
    </main>
    <script>
      const email = localStorage.getItem('demo-auth-email');
      const userEmail = document.getElementById('user-email');
      if (email) {
        userEmail.textContent = email;
      } else {
        userEmail.textContent = '未ログイン';
      }
    </script>
  </body>
</html>
