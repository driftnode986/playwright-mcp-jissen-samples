<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>ログイン</title>
  </head>
  <body>
    <main>
      <h1>ログイン</h1>
      <form id="login-form" aria-labelledby="login-heading">
        <h2 id="login-heading">アカウント情報</h2>
        <label>
          メールアドレス
          <input type="email" name="email" required autocomplete="email">
        </label>
        <label>
          パスワード
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">ログイン</button>
        <p role="alert" id="login-error" hidden>
          メールアドレスまたはパスワードが正しくありません
        </p>
      </form>
      <section id="welcome" hidden aria-live="polite">
        <h2>ようこそ <span id="welcome-email"></span> さん</h2>
        <p>
          <a href="./shop.html">商品検索ページへ</a>
        </p>
      </section>
    </main>
    <script>
      const form = document.getElementById('login-form');
      const welcome = document.getElementById('welcome');
      const welcomeEmail = document.getElementById('welcome-email');
      const error = document.getElementById('login-error');

      function applyState() {
        const email = localStorage.getItem('demo-auth-email');
        if (email) {
          welcomeEmail.textContent = email;
          form.hidden = true;
          welcome.hidden = false;
        }
      }
      applyState();

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const email = String(formData.get('email') ?? '').trim();
        const password = String(formData.get('password') ?? '').trim();
        if (!email || password.length < 8) {
          error.hidden = false;
          return;
        }
        error.hidden = true;
        localStorage.setItem('demo-auth-email', email);
        document.cookie = `demo-session=ok; SameSite=Lax`;
        applyState();
      });
    </script>
  </body>
</html>
