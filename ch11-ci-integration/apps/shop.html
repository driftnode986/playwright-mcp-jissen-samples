<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>商品検索</title>
  </head>
  <body>
    <header>
      <h1>商品検索</h1>
      <form id="search-form" role="search" aria-label="商品検索">
        <label>
          検索ワード
          <input type="search" name="query" autocomplete="off">
        </label>
        <button type="submit" class="btn-primary">検索</button>
      </form>
      <p>
        カート: <span id="cart-count" aria-live="polite">0</span> 件
      </p>
    </header>
    <main>
      <section aria-labelledby="results-heading">
        <h2 id="results-heading">検索結果</h2>
        <ul id="product-list" aria-label="商品一覧"></ul>
      </section>
    </main>
    <script>
      const products = [
        { id: 'p001', name: '黒色のキーボード' },
        { id: 'p002', name: '白色のキーボード' },
        { id: 'p003', name: 'ワイヤレスマウス' },
      ];
      const list = document.getElementById('product-list');
      const cartCount = document.getElementById('cart-count');
      const form = document.getElementById('search-form');
      let currentQuery = '';
      let cart = 0;

      function filtered() {
        if (!currentQuery) return products;
        return products.filter((p) => p.name.includes(currentQuery));
      }

      function render() {
        list.innerHTML = '';
        for (const product of filtered()) {
          const li = document.createElement('li');
          const name = document.createElement('span');
          name.textContent = product.name;
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'product-button';
          button.textContent = `${product.name}をカートに追加`;
          button.dataset.testid = `add-to-cart-${product.id}`;
          button.dataset.productId = product.id;
          button.addEventListener('click', () => {
            cart += 1;
            cartCount.textContent = String(cart);
          });
          li.append(name, ' ', button);
          list.append(li);
        }
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const data = new FormData(form);
        currentQuery = String(data.get('query') ?? '').trim();
        render();
      });
      render();
    </script>
  </body>
</html>
