<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>TodoMVC (local fixture)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; }
    header h1 { font-size: 1.6rem; }
    .new-todo { width: 100%; padding: 0.5rem; box-sizing: border-box; font-size: 1rem; }
    .todo-list { list-style: none; padding: 0; margin: 0; }
    .todo-list li { display: flex; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #ccc; }
    .todo-list li.completed label { text-decoration: line-through; color: #888; }
    .todo-list li label { flex: 1; padding: 0 0.5rem; cursor: pointer; }
    .todo-list li input.edit { flex: 1; padding: 0.25rem; }
    .todo-list .destroy { border: none; background: transparent; color: #c33; cursor: pointer; }
    .todo-list .destroy::before { content: '\00d7'; }
    .filters { list-style: none; display: flex; gap: 0.5rem; padding: 0; }
    .filters a { padding: 0.25rem 0.5rem; text-decoration: none; color: #444; border: 1px solid transparent; }
    .filters a.selected { border-color: #444; }
    .clear-completed { background: transparent; border: none; color: #c33; cursor: pointer; }
    footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>todos</h1>
    <input class="new-todo" placeholder="What needs to be done?" autofocus
           aria-label="New todo input" />
  </header>
  <main>
    <input id="toggle-all" type="checkbox" aria-label="Mark all as complete" />
    <label for="toggle-all">Mark all as complete</label>
    <ul class="todo-list" data-testid="todo-list" role="list" aria-label="Todos"></ul>
  </main>
  <footer>
    <span class="todo-count"><strong>0</strong> items left</span>
    <ul class="filters" role="list" aria-label="Filters">
      <li><a href="#/" class="selected" data-filter="all">All</a></li>
      <li><a href="#/active" data-filter="active">Active</a></li>
      <li><a href="#/completed" data-filter="completed">Completed</a></li>
    </ul>
    <button class="clear-completed">Clear completed</button>
  </footer>

  <script>
    const state = { todos: [], filter: 'all' };
    const $list = document.querySelector('.todo-list');
    const $count = document.querySelector('.todo-count strong');
    const $toggleAll = document.getElementById('toggle-all');
    const $clear = document.querySelector('.clear-completed');
    const $newTodo = document.querySelector('.new-todo');
    const $filters = document.querySelectorAll('.filters a');

    function render() {
      $list.innerHTML = '';
      const visible = state.todos.filter((t) => {
        if (state.filter === 'active') return !t.completed;
        if (state.filter === 'completed') return t.completed;
        return true;
      });
      for (const todo of visible) {
        const li = document.createElement('li');
        li.dataset.testid = 'todo-item';
        if (todo.completed) li.classList.add('completed');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'toggle';
        checkbox.checked = todo.completed;
        checkbox.setAttribute('aria-label', `Toggle ${todo.title}`);
        checkbox.addEventListener('change', () => {
          todo.completed = checkbox.checked;
          render();
        });
        const label = document.createElement('label');
        label.textContent = todo.title;
        label.addEventListener('dblclick', () => startEdit(li, todo));
        const destroy = document.createElement('button');
        destroy.className = 'destroy';
        destroy.setAttribute('aria-label', `Delete ${todo.title}`);
        destroy.addEventListener('click', () => {
          state.todos = state.todos.filter((x) => x !== todo);
          render();
        });
        li.append(checkbox, label, destroy);
        $list.appendChild(li);
      }
      const remaining = state.todos.filter((t) => !t.completed).length;
      $count.textContent = String(remaining);
      $toggleAll.checked =
        state.todos.length > 0 && remaining === 0;
    }

    function startEdit(li, todo) {
      const input = document.createElement('input');
      input.className = 'edit';
      input.value = todo.title;
      input.setAttribute('aria-label', `Edit ${todo.title}`);
      li.replaceChildren(input);
      input.focus();
      const finish = (commit) => {
        if (commit) {
          const next = input.value.trim();
          if (next) todo.title = next;
        }
        render();
      };
      input.addEventListener('blur', () => finish(true));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') finish(true);
        if (e.key === 'Escape') finish(false);
      });
    }

    $newTodo.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const title = $newTodo.value.trim();
      if (!title) return;
      state.todos.push({ title, completed: false });
      $newTodo.value = '';
      render();
    });

    $toggleAll.addEventListener('change', () => {
      state.todos.forEach((t) => (t.completed = $toggleAll.checked));
      render();
    });

    $clear.addEventListener('click', () => {
      state.todos = state.todos.filter((t) => !t.completed);
      render();
    });

    $filters.forEach((a) =>
      a.addEventListener('click', (e) => {
        e.preventDefault();
        state.filter = a.dataset.filter;
        $filters.forEach((x) => x.classList.toggle('selected', x === a));
        render();
      }),
    );

    render();
  </script>
</body>
</html>
